<svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" aria-label="Barom">
  <!-- Outer arc -->
  <path d="M 12 58 A 48 48 0 0 1 108 58" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Calibration ticks: left, top, right -->
  <line x1="12" y1="58" x2="16" y2="53" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="10" x2="60" y2="16" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="108" y1="58" x2="104" y2="53" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Needle pointing to ~67° (elevated zone) -->
  <line x1="60" y1="58" x2="91" y2="27" stroke-width="4" stroke-linecap="round"/>
  <!-- Pivot hub -->
  <circle cx="60" cy="58" r="5" fill="currentColor"/>
</svg>
